<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>투명 테두리 크롭 + 리사이즈</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h3>이미지 업로드</h3>
<input type="file" id="upload" accept="image/*"><br><br>

<label>가로(cm, 최대 18cm): </label>
<input type="number" id="width_cm" value="5" min="1" max="18">
<input type="text" id="text_input" placeholder="여기에 글씨 입력">
<button id="resizeBtn">리사이즈</button><br><br>

<img id="preview" alt="Preview">
<a id="download">다운로드</a>

<script src="script.js"></script>
</body>
</html>
